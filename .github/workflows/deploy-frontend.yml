name: Deploy Frontend to Azure App Service
 
on:
  push:
    branches:
      - main
    
            # only trigger when frontend code changes
 
jobs:
  build-and-deploy:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read
 
    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── 2. Setup Node.js ─────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
 
      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: npm ci
 
      # ── 4. Build Next.js ─────────────────────────────────────────
      - name: Build Next.js app
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build
 
      # ── 5. Prepare Standalone Files ──────────────────────────────
      - name: Prepare standalone files for deployment
        run: |
          cp -r frontend/public .next/standalone/frontend/public
          cp -r .next/static .next/standalone/.next/static
          cp web.config .next/standalone/web.config || true
   
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B62B69198A894496A7E962392FC5A657 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_046310D19D944A84A887FBF4DC7DAA14 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_37D85168C92348F9BDCE5A93B4793EBD }}

      - name: 'Deploy to Azure Web App'
        id: deploy-frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Vd-frontend'
          slot-name: 'prod'
          package:  .next/standalone

  # ── 6. Deploy to Azure App Service ───────────────────────────
      
 
 
 