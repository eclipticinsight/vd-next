name: Deploy Frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'          # only trigger when frontend code changes

jobs:
  build-and-deploy:
    name: Build & Deploy Next.js
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── 4. Build Next.js ─────────────────────────────────────────
      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      # ── 5. Prepare Standalone Files ──────────────────────────────
      - name: Prepare standalone files for deployment
        run: |
          cp -r frontend/public frontend/.next/standalone/public
          cp -r frontend/.next/static frontend/.next/standalone/.next/static
          cp frontend/web.config frontend/.next/standalone/web.config || true

      # ── 6. Deploy to Azure App Service ───────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}          # e.g. vd-frontend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: frontend/.next/standalone

