name: Build and Deploy to Azure
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
jobs:
  build:
    name: Build & Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
 
      - name: Install dependencies
        run: npm ci
 
      - name: Build Next.js app
        run: npm run build
 
      - name: Prepare standalone files for deployment
        run: |
          cp -r frontend/public .next/standalone/frontend/public
          cp -r .next/static .next/standalone/.next/static
          cp web.config .next/standalone/web.config || true
 
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: .next/standalone
          retention-days: 4
 
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          retention-days: 4
 
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
 
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
 
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B62B69198A894496A7E962392FC5A657 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_046310D19D944A84A887FBF4DC7DAA14 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_37D85168C92348F9BDCE5A93B4793EBD }}
 
      - name: Deploy to Azure Backend App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Visionarydynamicsas'
          slot-name: 'Production'
          package: .
 
 